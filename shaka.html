<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shaka Player - DASH + ClearKey</title>

<!-- Shaka Player -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>

<!-- Shaka UI -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.js"></script>

<style>
html,
body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    background: #000;
    overflow: hidden;
}

#video-container {
    width: 100vw;
    height: 100vh;
    position: relative;
}

video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
}
</style>
</head>

<body>

<div id="video-container"
     data-shaka-player-container
     data-shaka-player-cast-receiver-id="">
    <video id="video"
           data-shaka-player
           autoplay
           playsinline>
    </video>
</div>

<script>
async function initPlayer() {

    shaka.polyfill.installAll();

    if (!shaka.Player.isBrowserSupported()) {
        alert("Browser not supported!");
        return;
    }

    const video = document.getElementById("video");
    const player = new shaka.Player(video);

    window.player = player;

    player.addEventListener("error", function(event) {
        console.error("Shaka Error:", event.detail);
    });

    player.configure({
        drm: {
            clearKeys: {
                "e51aa21f2a0fef9aabc120dfb655b52f":
                "a12a987fe725a40b6be95cd84b15f689"
            }
        }
    });

    try {

        await player.load(
            "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/7janu55dwc/out/v1/69a2a7041395406b970598f61680e7cf/cenc.mpd"
        );

        console.log("Video loaded successfully");

    } catch (error) {
        console.error("Load failed:", error);
    }
}

document.addEventListener("DOMContentLoaded", initPlayer);
</script>

</body>
</html>
