<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shaka Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.js"></script>

<style>
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    background: #000;
    overflow: hidden;
}

#video-container {
    width: 100vw;
    height: 100vh;
}

video {
    width: 100%;
    height: 100%;
    background: #000;
}

#status {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    background: rgba(0,0,0,.7);
    padding: 10px;
    font-family: Arial, sans-serif;
    z-index: 9999;
    max-width: 500px;
}
</style>
</head>

<body>

<div id="status">Loading...</div>

<div id="video-container"
     data-shaka-player-container>
    <video id="video"
           data-shaka-player
           autoplay
           controls
           playsinline>
    </video>
</div>

<script>
async function initPlayer() {

    shaka.polyfill.installAll();

    const status = document.getElementById("status");

    if (!shaka.Player.isBrowserSupported()) {
        status.innerHTML = "Browser not supported";
        return;
    }

    const video = document.getElementById("video");
    const player = new shaka.Player(video);

    window.player = player;

    player.addEventListener("error", function(event) {
        console.error("Shaka Error:", event.detail);

        status.innerHTML =
            "Shaka Error<br>" +
            "Code: " + event.detail.code +
            "<br>" +
            JSON.stringify(event.detail, null, 2);
    });

    try {

        player.configure({
            drm: {
                clearKeys: {
                    "e51aa21f2a0fef9aabc120dfb655b52f":
                    "a12a987fe725a40b6be95cd84b15f689"
                }
            }
        });

        const manifest =
            "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/7janu55dwc/out/v1/69a2a7041395406b970598f61680e7cf/cenc.mpd";

        status.innerHTML = "Loading manifest...";

        await player.load(manifest);

        status.innerHTML = "Loaded successfully";

        try {
            await video.play();
        } catch(e) {
            console.log("Autoplay blocked:", e);
        }

    } catch (error) {

        console.error("Load failed:", error);

        status.innerHTML =
            "Load Failed<br><pre>" +
            JSON.stringify(error, null, 2) +
            "</pre>";
    }
}

document.addEventListener("DOMContentLoaded", initPlayer);
</script>

</body>
</html>
